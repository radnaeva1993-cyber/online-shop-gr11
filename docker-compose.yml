services:
  nginx:
    image: nginx
    ports:
    - 81:80
    volumes:
    - ./Docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    - ./:/var/www/html
    depends_on:
      - php-fpm
      - db

  php-fpm:
    build: ./Docker
    volumes:
      - ./:/var/www/html
    restart: always

  db:
    ports:
    - 5433:5432
    image: postgres:13
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

